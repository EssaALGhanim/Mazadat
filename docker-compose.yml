version: "3.9"

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: mazadat-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mazadat
      MYSQL_USER: mazadat_user
      MYSQL_PASSWORD: mazadat_password
      TZ: "Asia/Riyadh"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Mazadat/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mazadat-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Adminer for Database Management (lightweight, reliable)
  adminer:
    image: adminer:latest
    container_name: mazadat-adminer
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mazadat-network
    restart: unless-stopped

  # Spring Boot Backend
  backend:
    build:
      context: ./Mazadat
      dockerfile: Dockerfile
    container_name: mazadat-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mazadat
      SPRING_DATASOURCE_USERNAME: mazadat_user
      SPRING_DATASOURCE_PASSWORD: mazadat_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080
      MAZADAT_UPLOAD_DIR: /app/uploads
      MAZADAT_CORS_ALLOWED_ORIGINS: http://localhost:5137,http://127.0.0.1:5137
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-admin@mazadat.org}
    ports:
      - "8080:8080"
    volumes:
      - ./Mazadat/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mazadat-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # React Frontend in live-reload dev mode
  frontend:
    image: node:20-alpine
    container_name: mazadat-frontend
    working_dir: /app
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi
      && npm run dev -- --host 0.0.0.0 --port 5137"
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
      VITE_IMAGE_BASE_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5137:5137"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - mazadat-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:5137/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  mazadat-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  frontend_node_modules:
    driver: local
